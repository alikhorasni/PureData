name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[all,dev]"

      - name: Auto-fix fixable lint issues
        run: ruff check --fix --exit-zero src tests

      - name: Auto-format code
        run: ruff format src tests

      - name: Lint check for remaining issues
        run: ruff check src tests

      - name: Install mypy (explicit fallback)
        run: pip install mypy || true

      - name: Type check with mypy
        run: mypy src

      - name: Run unit tests
        run: pytest tests --cov=turboclean --cov-report=term-missing

      - name: Install extra dependencies for examples
        run: pip install scikit-learn fsspec openpyxl

      - name: Run example scripts
        run: |
          set -e
          for script in examples/*.py; do
            if [[ "$script" == *"11_streaming_from_url.py" ]]; then
              echo "Skipping network-dependent example: $script"
              continue
            fi
            echo "Running $script..."
            python "$script"
          done

  benchmark-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install --no-cache-dir ".[all,dev]"
      - name: Run benchmark
        run: python benchmarks/vs_pandas.py
